<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkUp | Professional App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --clickup-purple: #7b68ee; }
        body { background-color: #f8f9fb; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { background-color: #2a2e34; width: 260px; color: #b9bec7; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .main-view { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .gradient-banner { background: linear-gradient(90deg, #a855f7 0%, #ec4899 100%); }
        .glass-card { background: white; border-radius: 12px; border: 1px solid #e9ebf0; transition: all 0.2s ease; }
        .glass-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar flex flex-col p-6 shadow-xl">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 gradient-banner rounded-xl flex items-center justify-center font-bold text-white shadow-lg">W</div>
            <span class="font-bold text-white text-xl">WorkUp</span>
        </div>
        <nav class="flex-grow space-y-2">
            <button onclick="switchTab('home')" class="w-full text-left p-3 rounded-lg hover:bg-gray-700 transition flex items-center gap-3"><span>🏠</span> Home</button>
            <button onclick="switchTab('tasks')" class="w-full text-left p-3 rounded-lg hover:bg-gray-700 transition flex items-center gap-3"><span>✅</span> Tasks</button>
            <button onclick="switchTab('members')" class="w-full text-left p-3 rounded-lg hover:bg-gray-700 transition flex items-center gap-3"><span>👥</span> Members</button>
        </nav>
        <div class="pt-6 border-t border-gray-700">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-purple-500 flex items-center justify-center text-xs text-white font-bold">JD</div>
                <div class="text-xs text-white font-medium">Juan Dela Cruz <br><span class="text-gray-500">Admin</span></div>
            </div>
        </div>
    </aside>

    <main class="main-view">
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-10">
            <h2 id="view-title" class="font-bold text-lg text-gray-800">Home</h2>
            <div class="flex gap-4">
                <input type="text" placeholder="Search..." class="bg-gray-100 border-none rounded-lg px-4 py-2 text-sm outline-none w-64 focus:ring-2 focus:ring-purple-400">
                <button onclick="openTaskModal()" class="bg-[#7b68ee] hover:bg-[#6a56d6] text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md transition">+ Task</button>
            </div>
        </header>

        <div id="content-area" class="p-8">
            </div>
    </main>
</div>

<div id="taskModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl scale-in">
        <h2 class="text-2xl font-bold mb-6">Create New Task</h2>
        <div class="space-y-4">
            <input type="text" id="taskInput" placeholder="Task title" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
            <textarea id="descInput" placeholder="Description (optional)" class="w-full border p-3 rounded-xl h-24 outline-none"></textarea>
            <select id="priorityInput" class="w-full border p-3 rounded-xl outline-none">
                <option value="High">🔴 High Priority</option>
                <option value="Normal" selected>🟣 Normal Priority</option>
                <option value="Low">🟢 Low Priority</option>
            </select>
            <div class="flex justify-end gap-3 mt-4">
                <button onclick="closeTaskModal()" class="text-gray-400 font-bold px-4">Cancel</button>
                <button onclick="processAddTask()" class="bg-[#7b68ee] text-white px-8 py-3 rounded-xl font-bold shadow-lg">Save Task</button>
            </div>
        </div>
    </div>
</div>

<script>
    // APP STATE MANAGEMENT
    let tasks = JSON.parse(localStorage.getItem('bethel_app_tasks')) || [];

    function switchTab(tab) {
        const content = document.getElementById('content-area');
        const title = document.getElementById('view-title');
        
        if (tab === 'home') {
            title.innerText = "Home Dashboard";
            content.innerHTML = `
                <div class="gradient-banner rounded-3xl p-10 text-white shadow-xl mb-10">
                    <h1 class="text-3xl font-black mb-2">Welcome Back! 👋</h1>
                    <p class="opacity-90">Manage your virtual assistant team and projects here.</p>
                </div>
                <div class="grid grid-cols-3 gap-6">
                    <div class="glass-card p-6">
                        <p class="text-xs font-bold text-gray-400 uppercase">Total Tasks</p>
                        <h3 class="text-3xl font-black text-purple-600">${tasks.length}</h3>
                    </div>
                </div>
            `;
        } else if (tab === 'tasks') {
            title.innerText = "My Tasks";
            renderTaskList();
        }
    }

    function renderTaskList() {
        const content = document.getElementById('content-area');
        if (tasks.length === 0) {
            content.innerHTML = `<div class="text-center py-20 text-gray-400 italic">No tasks found. Create one!</div>`;
            return;
        }
        
        let html = '<div class="space-y-3">';
        tasks.forEach((t, i) => {
            html += `
                <div class="glass-card p-4 flex justify-between items-center bg-white">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" class="w-5 h-5 accent-purple-500">
                        <div>
                            <p class="font-bold text-sm">${t.title}</p>
                            <p class="text-xs text-gray-400">${t.priority} Priority</p>
                        </div>
                    </div>
                    <button onclick="deleteTask(${i})" class="text-gray-300 hover:text-red-500 transition">✕</button>
                </div>
            `;
        });
        content.innerHTML = html + '</div>';
    }

    function openTaskModal() { document.getElementById('taskModal').style.display = 'flex'; }
    function closeTaskModal() { document.getElementById('taskModal').style.display = 'none'; }

    function processAddTask() {
        const title = document.getElementById('taskInput').value;
        const priority = document.getElementById('priorityInput').value;
        if (!title) return alert("Task title required!");

        tasks.push({ title, priority, date: new Date().toLocaleDateString() });
        localStorage.setItem('bethel_app_tasks', JSON.stringify(tasks));
        
        document.getElementById('taskInput').value = '';
        closeTaskModal();
        switchTab('tasks');
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        localStorage.setItem('bethel_app_tasks', JSON.stringify(tasks));
        renderTaskList();
    }

    // Initialize App
    switchTab('home');
</script>

</body>
</html>
