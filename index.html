<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bethel Core Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-2xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">Bethel Core</h1>
            <p class="text-slate-400">Task Management Dashboard</p>
        </header>

        <div class="glass p-6 mb-8">
            <div class="flex gap-3">
                <input type="text" id="taskInput" placeholder="Add a new task..." 
                    class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                <button onclick="addTask()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-lg font-bold transition-all shadow-lg">Add</button>
            </div>
        </div>

        <div id="taskList" class="space-y-3">
            </div>
    </div>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            if (taskText === "") return;

            const list = document.getElementById('taskList');
            const div = document.createElement('div');
            div.className = "glass p-4 flex justify-between items-center animate-in fade-in slide-in-from-bottom-2 duration-300";
            div.innerHTML = `
                <span class="text-slate-200">${taskText}</span>
                <button onclick="this.parentElement.remove()" class="text-slate-500 hover:text-red-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            `;
            list.appendChild(div);
            input.value = "";
        }
    </script>
</body>
</html>
